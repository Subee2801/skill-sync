<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSync | Screen Smarter. Hire Better.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            z-index: 9999;
            overflow: hidden;
        }
        #loading-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader {
            position: relative;
            margin: 0 auto;
            width: 120px;
            animation: speeder .4s linear infinite;
        }
        .loader > span {
            height: 5px;
            width: 35px;
            background: #8b5cf6;
            position: absolute;
            top: -19px;
            left: 60px;
            border-radius: 2px 10px 1px 0;
        }
        .base span {
            position: absolute;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-right: 100px solid #8b5cf6;
            border-bottom: 6px solid transparent;
        }
        .base span:before {
            content: '';
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: #8b5cf6;
            position: absolute;
            right: -110px;
            top: -16px;
        }
        .base span:after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-top: 0 solid transparent;
            border-right: 55px solid #8b5cf6;
            border-bottom: 16px solid transparent;
            top: -16px;
            right: -98px;
        }
        .face {
            position: absolute;
            height: 12px;
            width: 20px;
            background: #8b5cf6;
            border-radius: 20px 20px 0 0;
            transform: rotate(-40deg);
            right: -125px;
            top: -15px;
        }
        .face:after {
            content: '';
            height: 12px;
            width: 12px;
            background: #8b5cf6;
            right: 4px;
            top: 7px;
            position: absolute;
            transform: rotate(40deg);
            transform-origin: 50% 50%;
            border-radius: 0 0 0 2px;
        }
        .loader > span > span:nth-child(1),
        .loader > span > span:nth-child(2),
        .loader > span > span:nth-child(3),
        .loader > span > span:nth-child(4) {
            width: 30px;
            height: 1px;
            background: #8b5cf6;
            position: absolute;
            animation: fazer1 .2s linear infinite;
        }
        .loader > span > span:nth-child(2) { top: 3px; animation: fazer2 .4s linear infinite; }
        .loader > span > span:nth-child(3) { top: 1px; animation: fazer3 .4s linear infinite; animation-delay: -1s; }
        .loader > span > span:nth-child(4) { top: 4px; animation: fazer4 1s linear infinite; animation-delay: -1s; }

        .longfazers {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .longfazers span {
            position: absolute;
            height: 2px;
            width: 20%;
            background: #8b5cf6;
            opacity: 0.15;
        }
        .longfazers span:nth-child(1) { top: 20%; animation: lf .6s linear infinite; animation-delay: -5s; }
        .longfazers span:nth-child(2) { top: 40%; animation: lf2 .8s linear infinite; animation-delay: -1s; }
        .longfazers span:nth-child(3) { top: 60%; animation: lf3 .6s linear infinite; }
        .longfazers span:nth-child(4) { top: 80%; animation: lf4 .5s linear infinite; animation-delay: -3s; }

        .loading-text {
            margin-top: 50px;
            color: #ffffff;
            font-family: "Inter", sans-serif;
            letter-spacing: 0.12em;
            animation: pulseFade 1.4s ease-in-out infinite;
        }
        @keyframes pulseFade { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
        @keyframes speeder { 0% { transform: translate(2px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -3px) rotate(-1deg); } 20% { transform: translate(-2px, 0px) rotate(1deg); } 30% { transform: translate(1px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 3px) rotate(-1deg); } 60% { transform: translate(-1px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-2px, -1px) rotate(1deg); } 90% { transform: translate(2px, 1px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        @keyframes fazer1 { 0% { left: 0; } 100% { left: -80px; opacity: 0; } }
        @keyframes fazer2 { 0% { left: 0; } 100% { left: -100px; opacity: 0; } }
        @keyframes fazer3 { 0% { left: 0; } 100% { left: -50px; opacity: 0; } }
        @keyframes fazer4 { 0% { left: 0; } 100% { left: -150px; opacity: 0; } }
        @keyframes lf { 0% { left: 200%; } 100% { left: -200%; opacity: 0; } }
        @keyframes lf2 { 0% { left: 200%; } 100% { left: -200%; opacity: 0; } }
        @keyframes lf3 { 0% { left: 200%; } 100% { left: -100%; opacity: 0; } }
        @keyframes lf4 { 0% { left: 200%; } 100% { left: -100%; opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <nav class="navbar">
        <div class="logo">⚡ SkillSync</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/screen">Screen</a>
            <a href="/report">Report</a>
        </div>
    </nav>

    <main class="container hero-wrap">
        <h1 class="gradient-text hero-title">Screen Smarter. Hire Better.</h1>

        <section class="glass-card form-card">
            <label>Job Title</label>
            <input id="jobTitle" type="text" placeholder="Software Engineer">

            <label>Job Description</label>
            <textarea id="jobDescription">We are hiring a Software Engineer with strong Python, Flask, SQL, Docker, Git, REST API and AWS knowledge. The ideal candidate has experience in cloud deployments, CI/CD workflows, and building scalable backend systems with clean architecture and testing best practices.</textarea>

            <div class="slider-row">
                <label>Minimum Match Score: <span id="scoreValue">50%</span></label>
                <input id="minScore" type="range" min="0" max="100" value="50">
            </div>

            <label>Boost Keywords (comma-separated)</label>
            <input id="boostKeywords" type="text" placeholder="python, docker, aws">

            <button id="startScreening" class="btn-primary">Start Screening →</button>
        </section>

    </main>
    <div id="loading-overlay">
        <div class="longfazers"><span></span><span></span><span></span><span></span></div>
        <div class="loader">
            <span><span></span><span></span><span></span><span></span></span>
            <div class="base"><span></span><div class="face"></div></div>
        </div>
        <p class="loading-text">Analyzing Resumes...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        initParticles("particle-canvas");
        initTiltCards();

        const jobTitle = document.getElementById("jobTitle");
        const jobDescription = document.getElementById("jobDescription");
        const minScore = document.getElementById("minScore");
        const scoreValue = document.getElementById("scoreValue");
        const boostKeywords = document.getElementById("boostKeywords");

        jobTitle.value = localStorage.getItem("jobTitle") || "";
        jobDescription.value = localStorage.getItem("jobDescription") || jobDescription.value;
        minScore.value = localStorage.getItem("minScore") || "50";
        boostKeywords.value = localStorage.getItem("boostKeywords") || "";
        scoreValue.textContent = `${minScore.value}%`;

        minScore.addEventListener("input", () => {
            scoreValue.textContent = `${minScore.value}%`;
        });

        document.getElementById("startScreening").addEventListener("click", () => {
            localStorage.setItem("jobTitle", jobTitle.value.trim());
            localStorage.setItem("jobDescription", jobDescription.value.trim());
            localStorage.setItem("minScore", minScore.value);
            localStorage.setItem("boostKeywords", boostKeywords.value.trim());
            const overlay = document.getElementById("loading-overlay");
            overlay.classList.add("active");
            setTimeout(() => {
                window.location.href = "/screen";
            }, 2500);
        });
    </script>
</body>
</html>
