<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Resume Screener</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">🧠 ResumeAI Screener</div>
    <p class="tagline">Smart Hiring, Zero Bias</p>
  </header>

  <!-- MAIN APP -->
  <main>

    <!-- STEP 1: JOB DESCRIPTION -->
    <section class="card" id="jd-section">
      <h2>📋 Step 1: Enter Job Description</h2>
      <textarea id="jd-input" placeholder="Paste the job description here..."></textarea>
      <button onclick="analyzeJD()">🔍 Analyze JD</button>
      <div id="jd-keywords" class="keywords-box hidden"></div>
      <div id="bias-result" class="bias-box hidden"></div>
    </section>

    <!-- STEP 2: UPLOAD RESUMES -->
    <section class="card" id="resume-section">
      <h2>📄 Step 2: Upload Resumes</h2>
      <input type="file" id="resume-upload" accept=".pdf,.txt" multiple />
      <button onclick="processResumes()">⚙️ Process Resumes</button>
      <div id="upload-status" class="status-box hidden"></div>
    </section>

    <!-- STEP 3: RESULTS -->
    <section class="card hidden" id="results-section">
      <h2>🏆 Step 3: Candidate Rankings</h2>
      <div id="rankings-container"></div>
    </section>

    <!-- STEP 4: INTERVIEW QUESTIONS -->
    <section class="card hidden" id="interview-section">
      <h2>🎤 Step 4: Interview Questions</h2>
      <div id="interview-container"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>Built at Hack Carnival 2025 ⚡ Smart Resume Screener Lite</p>
  </footer>

  <!-- SCRIPTS — order matters! -->
  <script src="js/nlp.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/scorer.js"></script>
  <script src="js/highlighter.js"></script>
  <script src="js/bias.js"></script>
  <script src="js/interview.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
